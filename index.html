<!DOCTYPE html>
<html lang="en">
<head>
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search URL</title>
</head>
<body>

    <input type="text" id="searchInput" placeholder="Type something...">
    <button onclick="addQuery()">Search</button>
    <a href="https://belphegordos.github.io/">
        <button>Reload</button>
    </a>
    <div id="queryDisplay">
        <p id="url">Full url: </p>
        <h2>URL QD</h2>
    </div>

    <script>
        let count = 1;

        function addQuery() {
            const input = document.getElementById("searchInput").value;

            const params = new URLSearchParams(window.location.search);

            // Encode input before putting into URL
            const safeInput = encodeURIComponent(input);

            params.append("q" + count, safeInput);
            count++;

            history.pushState({}, "", "?" + params.toString());

            const display = document.getElementById("queryDisplay");
            const p = document.createElement("p");

            // Decode for display so it looks normal
            p.textContent = decodeURIComponent(safeInput);

            display.appendChild(p);

            document.getElementById("url").innerHTML =
                "Full url: " + window.location.href;
        }
    </script>

</body>
</html>
